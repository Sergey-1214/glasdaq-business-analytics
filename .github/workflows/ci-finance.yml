name: CI - Finance Service

on:
  push:
    paths:
      - 'services/finance_service/**'
      - '.github/workflows/ci-finance.yml'
    branches: [ main ]
  
  pull_request:
    paths:
      - 'services/finance_service/**'
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'services/finance_service/requirements.txt'
    
    - name: Install dependencies
      working-directory: ./services/finance_service
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black mypy isort
    
    - name: Lint with flake8
      working-directory: ./services/finance_service
      run: |
        flake8 src tests --count --statistics --max-line-length=100
    
    - name: Check formatting with black
      working-directory: ./services/finance_service
      run: |
        black --check src tests
    
    - name: Type check with mypy
      working-directory: ./services/finance_service
      run: |
        mypy src
    
    - name: Run tests
      working-directory: ./services/finance_service
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Build Docker image
      if: github.ref == 'refs/heads/main'
      working-directory: ./services/finance_service
      run: |
        docker build -t finance-service:latest .
    
    - name: Test Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker run -d --name test-finance -p 8004:8004 finance-service:latest
        sleep 5
        curl -f http://localhost:8004 || exit 1
        docker stop test-finance