name: CI - Orchestrator Service

on:
  push:
    paths:
      - 'services/orchestrator/**'
      - '.github/workflows/ci-orchestrator.yml'
    branches: [ main ]
  
  pull_request:
    paths:
      - 'services/orchestrator/**'
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'services/orchestrator/requirements.txt'
    
    - name: Install dependencies
      working-directory: ./services/orchestrator
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black mypy isort
    
    - name: Lint with flake8
      working-directory: ./services/orchestrator
      run: |
        flake8 src tests --count --statistics --max-line-length=100
    
    - name: Check formatting with black
      working-directory: ./services/orchestrator
      run: |
        black --check src tests
    
    - name: Type check with mypy
      working-directory: ./services/orchestrator
      run: |
        mypy src
    
    - name: Run tests
      working-directory: ./services/orchestrator
      continue-on-error: true 
      run: |
        if [ -d tests ] && [ "$(ls -A tests/ 2>/dev/null)" ]; then
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        else
          echo "⚠️ No tests yet - skipping"
        fi
    
    - name: Build Docker image
      if: github.ref == 'refs/heads/main'
      working-directory: ./services/orchestrator
      run: |
        docker build -t orchestrator-service:latest .
    
    - name: Test Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker run -d --name test-orchestrator -p 8001:8001 orchestrator-service:latest
        sleep 5
        curl -f http://localhost:8001 || exit 1
        docker stop test-orchestrator