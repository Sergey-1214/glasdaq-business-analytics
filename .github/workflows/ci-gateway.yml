name: CI - API Gateway Service

on:
  push:
    paths:
      - 'api_gateway/**'
      - '.github/workflows/ci-gateway.yml'
    branches: [ main ]
  
  pull_request:
    paths:
      - 'api_gateway/**'
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'api_gateway/requirements.txt'
    
    - name: Install dependencies
      working-directory: ./api_gateway
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black mypy isort
    
    - name: Lint with flake8
      working-directory: ./api_gateway
      run: |
        flake8 src tests --count --statistics --max-line-length=100
    
    - name: Check formatting with black
      working-directory: ./api_gateway
      run: |
        black --check src tests
    
    - name: Type check with mypy
      working-directory: ./api_gateway
      run: |
        mypy src
    
    - name: Run tests
      working-directory: ./api_gateway
      continue-on-error: true 
      run: |
        if [ -d tests ] && [ "$(ls -A tests/ 2>/dev/null)" ]; then
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        else
          echo "⚠️ No tests yet - skipping"
        fi
    
    - name: Build Docker image
      if: github.ref == 'refs/heads/main'
      working-directory: ./api_gateway
      run: |
        docker build -t api-gateway-service:latest .
    
