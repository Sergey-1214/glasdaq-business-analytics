name: CI - API Gateway Service

on:
  push:
    paths:
      - 'services/api_gateway/**'
      - '.github/workflows/ci-gateway.yml'
    branches: [ main ]
  
  pull_request:
    paths:
      - 'services/api_gateway/**'
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'services/api_gateway/requirements.txt'
    
    - name: Install dependencies
      working-directory: ./services/api_gateway
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black mypy isort
    
    - name: Lint with flake8
      working-directory: ./services/api_gateway
      run: |
        flake8 src tests --count --statistics --max-line-length=100
    
    - name: Check formatting with black
      working-directory: ./services/api_gateway
      run: |
        black --check src tests
    
    - name: Type check with mypy
      working-directory: ./services/api_gateway
      run: |
        mypy src
    
    - name: Run tests
      working-directory: ./services/api_gateway
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Build Docker image
      if: github.ref == 'refs/heads/main'
      working-directory: ./services/api_gateway
      run: |
        docker build -t api-gateway-service:latest .
    
    - name: Test Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker run -d --name test-gateway -p 8000:8000 api-gateway-service:latest
        sleep 5
        curl -f http://localhost:8000 || exit 1
        docker stop test-gateway