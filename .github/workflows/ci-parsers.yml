name: CI - Parsers Service

on:
  push:
    paths:
      - 'services/parsers/**'
      - '.github/workflows/ci-parsers.yml'
    branches: [ main ]
  
  pull_request:
    paths:
      - 'services/parsers/**'
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'services/parsers/requirements.txt'
    
    - name: Install dependencies
      working-directory: ./services/parsers
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black mypy isort
    
    - name: Lint with flake8
      working-directory: ./services/parsers
      run: |
        flake8 src tests --count --statistics --max-line-length=100
    
    - name: Check formatting with black
      working-directory: ./services/parsers
      run: |
        black --check src tests
    
    - name: Type check with mypy
      working-directory: ./services/parsers
      run: |
        mypy src
    
    - name: Run tests
      working-directory: ./services/parsers
      continue-on-error: true 
      run: |
        if [ -d tests ] && [ "$(ls -A tests/ 2>/dev/null)" ]; then
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        else
          echo "⚠️ No tests yet - skipping"
        fi
    
    - name: Build Docker image
      if: github.ref == 'refs/heads/main'
      working-directory: ./services/parsers
      run: |
        docker build -t parsers-service:latest .
    
